name: Deploy CRUD S3 Service

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------
      # SET ENV
      # ----------------------
      - name: Set environment
        run: |
          case "${GITHUB_REF_NAME}" in
            main) ENV=prod ;;
            test) ENV=test ;;
            dev)  ENV=dev  ;;
            *)
              echo "âťŚ Invalid branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "âś… ENV=$ENV"

      # ----------------------
      # DEBUG
      # ----------------------
      - name: Debug
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "ENV: $ENV"
          cat config/env-config.json

      # ----------------------
      # AWS AUTH
      # ----------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      # ----------------------
      # LOAD CONFIG
      # ----------------------
      - name: Load config
        run: |
          set -e

          SERVICE_NAME=$(jq -r ".service.name" config/env-config.json)
          BUCKET=$(jq -r ".environments[\"$ENV\"].s3_bucket" config/env-config.json)

          if [ -z "$SERVICE_NAME" ] || [ "$SERVICE_NAME" == "null" ]; then
            echo "âťŚ SERVICE_NAME missing"
            exit 1
          fi

          if [ -z "$BUCKET" ] || [ "$BUCKET" == "null" ]; then
            echo "âťŚ BUCKET missing for ENV=$ENV"
            exit 1
          fi

          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV

          echo "âś… SERVICE_NAME=$SERVICE_NAME"
          echo "âś… BUCKET=$BUCKET"

      # ----------------------
      # BUILD LAMBDA
      # ----------------------
      - name: Build package
        run: |
          mkdir -p build

          cd lambdas
          zip -r ../build/${SERVICE_NAME}-db-artifact.zip . > /dev/null
          cd ..

      # ----------------------
      # UPLOAD TO S3
      # ----------------------
      - name: Upload Lambda
        run: |
          CODE_KEY="$ENV/${SERVICE_NAME}-db-artifact.zip"

          echo "Uploading to s3://$BUCKET/$CODE_KEY"

          aws s3 cp \
            build/${SERVICE_NAME}-db-artifact.zip \
            s3://$BUCKET/$CODE_KEY

          echo "CODE_KEY=$CODE_KEY" >> $GITHUB_ENV

      # ----------------------
      # DEPLOY CFN
      # ----------------------
      - name: Deploy Infra
        run: |
          aws cloudformation deploy \
            --template-file infra/service-infra-cft.yaml \
            --stack-name jsvm-database-${ENV}-${SERVICE_NAME} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ServiceName=${SERVICE_NAME} \
              Environment=${ENV} \
              CodeBucket=${BUCKET} \
              CodeKey=${CODE_KEY}

      # ----------------------
      # OUTPUT API URL
      # ----------------------
      - name: Get API URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name jsvm-database-${ENV}-${SERVICE_NAME} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          echo "đźš€ API URL: $API_URL"

      - name: Publish Stack Outputs
        run: |
          STACK_NAME="jsvm-database-${ENV}-${SERVICE_NAME}"

          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs" \
            --output json)

          echo "## đźš€ Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** $SERVICE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Stack:** $STACK_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outputs" >> $GITHUB_STEP_SUMMARY

          echo "$OUTPUTS" | jq -r '.[] | "- \(.OutputKey): \(.OutputValue)"' >> $GITHUB_STEP_SUMMARY