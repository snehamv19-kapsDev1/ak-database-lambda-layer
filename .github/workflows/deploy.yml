name: Deploy CRUD S3 Service

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------
      # SET ENV
      # ----------------------
      - name: Set environment
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF_NAME}" == "test" ]]; then
            echo "ENV=test" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      # ----------------------
      # DEBUG (SAFEGUARD)
      # ----------------------
      - name: Debug environment
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "ENV: $ENV"
          cat config/env-config.json

      # ----------------------
      # AWS AUTH
      # ----------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      # ----------------------
      # LOAD CONFIG (FIXED + SAFE)
      # ----------------------
      - name: Load config
        run: |
          set -e

          SERVICE_NAME=$(jq -r ".service.name" config/env-config.json)
          BUCKET=$(jq -r ".environments[\"$ENV\"].s3_bucket" config/env-config.json)

          echo "SERVICE_NAME=$SERVICE_NAME"
          echo "BUCKET=$BUCKET"

          # đź”Ą FAIL FAST IF CONFIG IS BROKEN
          if [ -z "$SERVICE_NAME" ] || [ "$SERVICE_NAME" == "null" ]; then
            echo "âťŚ SERVICE_NAME missing in config"
            exit 1
          fi

          if [ -z "$BUCKET" ] || [ "$BUCKET" == "null" ]; then
            echo "âťŚ BUCKET missing for ENV=$ENV"
            exit 1
          fi

          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV

      # ----------------------
      # BUILD LAMBDA
      # ----------------------
      - name: Build package
        run: |
          mkdir -p build

          cd lambdas/
          zip -r ../build/${SERVICE_NAME}-db-artifact.zip . > /dev/
          cd ..

      # ----------------------
      # UPLOAD TO S3 (FIXED PATH SAFETY)
      # ----------------------
      - name: Upload Lambda
        run: |
          echo "Uploading to bucket: $BUCKET"

          aws s3 cp \
            build/${SERVICE_NAME}-db-artifact.zip \
            s3://$BUCKET/database/${SERVICE_NAME}-db-artifact.zip

      # ----------------------
      # DEPLOY CFN
      # ----------------------
      - name: Deploy Infra
        run: |
          aws cloudformation deploy \
            --template-file infra/service-infra-cft.yaml \
            --stack-name crud-${ENV} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides BucketName=$BUCKET