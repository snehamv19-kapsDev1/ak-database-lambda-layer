name: Deploy CRUD S3 Service

on:
  push:
    branches: [dev, test, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------
      # SET ENV
      # ----------------------
      - name: Set environment
        run: |
          case "${GITHUB_REF_NAME}" in
            main) ENV=prod ;;
            test) ENV=test ;;
            dev)  ENV=dev  ;;
            *)
              echo "❌ Invalid branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

          echo "ENV=$ENV" >> $GITHUB_ENV
          echo "✅ ENV=$ENV"

      # ----------------------
      # DEBUG
      # ----------------------
      - name: Debug
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "ENV: $ENV"

      # ----------------------
      # AWS AUTH
      # ----------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

     # ----------------------
      # SET SERVICE NAME (FIXED)
      # ----------------------
      - name: Set Service Name
        run: |
          SERVICE_NAME=$(echo "${GITHUB_REPOSITORY}" | cut -d'/' -f2)
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
          echo "✅ SERVICE_NAME=$SERVICE_NAME"

      # ----------------------
      # LOAD CONFIG from SSM
      # ----------------------
      - name: Load Infra Config from SSM
        run: |
          set -e
          BUCKET=$(aws ssm get-parameter \
            --name "/jsvm/${ENV}/code-bucket" \
            --query "Parameter.Value" \
            --output text)
      
          if [ -z "$BUCKET" ] || [ "$BUCKET" == "None" ]; then
            echo "❌ SSM bucket not found"
            exit 1
          fi
      
          echo "BUCKET=$BUCKET" >> $GITHUB_ENV
    

      # ----------------------
      # BUILD LAMBDA
      # ----------------------
      - name: Build package
        run: |
          mkdir -p build

          cd lambdas
          zip -r ../build/${SERVICE_NAME}-artifact.zip . > /dev/null
          cd ..

      - name: Upload Lambda Zip
        run: |
          CODE_KEY="${ENV}/${SERVICE_NAME}-artifact.zip"
      
          aws s3 cp \
            build/${SERVICE_NAME}-artifact.zip \
            s3://$BUCKET/$CODE_KEY
      
          echo "CODE_KEY=$CODE_KEY" >> $GITHUB_ENV

      - name: Update Lambda Code (Direct Deploy)
        run: |
          aws lambda update-function-code \
            --function-name ${ENV}-${SERVICE_NAME}-crud \
            --s3-bucket $BUCKET \
            --s3-key $CODE_KEY

      # ----------------------
      # DEPLOY CFN
      # ----------------------
      - name: Deploy Service
        run: |
          STACK_NAME="jsvm-${ENV}-${SERVICE_NAME}"
#
#          STACK_EXISTS=$(aws cloudformation describe-stacks \
#            --stack-name "$STACK_NAME" \
#            2>/dev/null || echo "NO")
#
#          if [[ "$STACK_EXISTS" == "NO" ]]; then
#            echo "🆕 Creating stack: $STACK_NAME"
#          else
#            echo "🔁 Updating stack: $STACK_NAME"
#          fi
#
          aws cloudformation deploy \
            --template-file infra/service-infra-cft.yaml \
            --stack-name $STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ServiceName=${SERVICE_NAME} \
              Environment=${ENV} \
              CodeBucket=${BUCKET} \
              CodeKey=${CODE_KEY}

      # ----------------------
      # OUTPUT API URL
      # ----------------------
      - name: Get API URL
        run: |
          set -e
      
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name jsvm-${ENV}-${SERVICE_NAME} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
      
          if [ "$API_URL" == "None" ] || [ -z "$API_URL" ]; then
            echo "❌ API URL not found"
            exit 1
          fi
      
          echo "🚀 API URL: $API_URL"

      - name: Publish Stack Outputs
        run: |
          STACK_NAME="jsvm-${ENV}-${SERVICE_NAME}"
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs" \
            --output json)
      
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** $SERVICE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Stack:** $STACK_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outputs" >> $GITHUB_STEP_SUMMARY
      
          echo "$OUTPUTS" | jq -r '.[] | "- \(.OutputKey): \(.OutputValue)"' >> $GITHUB_STEP_SUMMARY