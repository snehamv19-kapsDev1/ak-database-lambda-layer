AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  BucketName:
    Type: String
  Environment:
    Type: String

Resources:
  CrudBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

  CrudLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: jsvm-database-s3-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${BucketName}/*"